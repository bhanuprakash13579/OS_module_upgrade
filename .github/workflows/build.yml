name: Build COPS Desktop App

on:
  push:
    tags:
      - 'v*'           # trigger on version tags like v1.0.0
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            python-server-name: python-server.exe
            tauri-target: x86_64-pc-windows-msvc
            binary-suffix: x86_64-pc-windows-msvc

          - platform: ubuntu-22.04
            python-server-name: python-server
            tauri-target: x86_64-unknown-linux-gnu
            binary-suffix: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python + PyInstaller (build python-server binary) ───
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # WeasyPrint needs Pango/Cairo on Windows (via GTK3 runtime)
      - name: Install GTK3 runtime for WeasyPrint (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install gtk-runtime --yes
          refreshenv

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build python-server with PyInstaller
        working-directory: backend
        run: pyinstaller python-server.spec --noconfirm

      # Copy the built binary into Tauri's expected location
      - name: Copy python-server binary → Tauri binaries folder (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cp backend/dist/python-server \
             frontend/src-tauri/binaries/python-server-x86_64-unknown-linux-gnu

      - name: Copy python-server binary → Tauri binaries folder (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          copy backend\dist\python-server.exe `
               frontend\src-tauri\binaries\python-server-x86_64-pc-windows-msvc.exe

      # ── 3. Node + Tauri build ──────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri-target }}

      # Linux system dependencies for Tauri
      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: npx tauri

      # ── 4. Upload installers as release artifacts ──────────────
      - name: Upload Linux installer
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: COPS-Linux
          path: |
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows installer
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: COPS-Windows
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
