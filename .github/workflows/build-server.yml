name: Build COPS Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Allows manual triggering from the GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: cops-server-windows.exe
            pyinstaller_args: "--clean python-server.spec"
            bundle_name: "dist/python-server.exe"
          - os: ubuntu-latest
            artifact_name: cops-server-linux
            pyinstaller_args: "--clean python-server.spec"
            bundle_name: "dist/python-server"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend (React)
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Copy Frontend Build to Backend
        shell: bash
        run: |
          mkdir -p backend/frontend_dist
          cp -r frontend/dist/* backend/frontend_dist/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python Server with PyInstaller
        working-directory: ./backend
        run: pyinstaller ${{ matrix.pyinstaller_args }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: backend/${{ matrix.bundle_name }}
          retention-days: 7
