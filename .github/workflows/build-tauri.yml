name: CI Build (verify code compiles)

# ─────────────────────────────────────────────────────────────────────────────
# This workflow runs on EVERY push to main to verify the code compiles.
# It uploads installers as temporary artifacts (7-day expiry) but does NOT
# create a GitHub Release and does NOT trigger the auto-updater in the app.
#
# To publish an actual release that users can auto-update to, use:
#   git tag v2.1.0 && git push origin v2.1.0
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build Tauri on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary_src: "backend/dist/python-server.exe"
            binary_dest: "frontend/src-tauri/binaries/python-server-x86_64-pc-windows-msvc.exe"
            tauri_args: "--bundles msi,nsis"
            rust_targets: ""

          - os: ubuntu-22.04
            binary_src: "backend/dist/python-server"
            binary_dest: "frontend/src-tauri/binaries/python-server-x86_64-unknown-linux-gnu"
            tauri_args: "--bundles deb,appimage"
            rust_targets: ""

          - os: macos-14        # arm64 Apple Silicon; macos-latest (=15) breaks bundle_dmg.sh
            binary_src: "backend/dist/python-server"
            binary_dest: "frontend/src-tauri/binaries/python-server-aarch64-apple-darwin"
            tauri_args: "--bundles app,dmg --target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Node setup (must come before PyInstaller — spec bundles frontend/dist) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (creates frontend/dist required by PyInstaller spec)
        working-directory: ./frontend
        run: npm run build

      # ── Linux system dependencies (before PyInstaller so hooks find everything) ──
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgdk-pixbuf2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libsqlcipher-dev

      # ── Python / PyInstaller ─────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install native dependencies (macOS — pyodbc + WeasyPrint Cairo/Pango)
        if: runner.os == 'macOS'
        run: brew install unixodbc pango cairo fontconfig

      - name: Install Python Dependencies
        working-directory: ./backend
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements.txt
          python -m pip install pyinstaller

      - name: Install sqlcipher3-binary (Windows — DB encryption)
        if: matrix.os == 'windows-latest'
        working-directory: ./backend
        shell: bash
        run: |
          python -m pip install --prefer-binary sqlcipher3-binary             || python -m pip install --prefer-binary "sqlcipher3-binary==0.5.0.post1"
          python -c "import sqlcipher3; print('✓ sqlcipher3 loaded — DB encryption enabled')"

      - name: Install sqlcipher3 (Linux — DB encryption, links to system libsqlcipher)
        if: matrix.os == 'ubuntu-22.04'
        working-directory: ./backend
        run: |
          python -m pip install --prefer-binary sqlcipher3-binary             || python -m pip install sqlcipher3
          python -c "import sqlcipher3; print('✓ sqlcipher3 loaded — DB encryption enabled')"

      - name: Bake admin password hash into source
        working-directory: ./backend
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          python -m pip install --prefer-binary bcrypt
          python bake_hash.py

      # WeasyPrint needs Cairo + Pango DLLs present when PyInstaller runs so the
      # hook can find and bundle them. Must come AFTER pip install — adding
      # C:\msys64\mingw64\bin to PATH before pip would shadow setup-python's python.exe.
      - name: Install GTK3 via MSYS2 (Windows — Cairo + Pango for WeasyPrint PDF)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          C:\msys64\usr\bin\pacman -S --noconfirm --needed `
            mingw-w64-x86_64-cairo `
            mingw-w64-x86_64-pango `
            mingw-w64-x86_64-gdk-pixbuf2 `
            mingw-w64-x86_64-fontconfig `
            mingw-w64-x86_64-harfbuzz
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Python Sidecar (PyInstaller)
        working-directory: ./backend
        run: pyinstaller --clean python-server.spec

      # ── Smoke-test: verify the sidecar actually starts ───────────────────────
      # Runs the binary for up to 30 s and checks that it binds on port 8000.
      # Catches silent startup crashes (missing imports, bad hash bake, etc.)
      # before the binary is bundled and distributed.
      - name: Smoke-test Python sidecar (Linux / macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          ${{ matrix.binary_src }} &
          SIDECAR_PID=$!
          echo "Sidecar PID: $SIDECAR_PID"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/mode > /dev/null 2>&1; then
              echo "OK Sidecar responded on port 8000 after ${i}s"
              kill $SIDECAR_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "FAIL Sidecar did not respond within 30 seconds"
          kill $SIDECAR_PID 2>/dev/null || true
          exit 1

      - name: Disable Windows Defender real-time scanning for CI paths
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          # PyInstaller onefile EXEs extract to %TEMP%\_MEIxxxxxx; Defender scans
          # every extracted DLL which can take 60-120 s on CI runners.
          Add-MpPreference -ExclusionPath $env:TEMP
          Add-MpPreference -ExclusionPath $env:TMP
          Add-MpPreference -ExclusionPath "C:\Users"
          Add-MpPreference -ExclusionPath "D:\"
          Add-MpPreference -ExclusionPath (Resolve-Path "backend\dist").Path
          Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Smoke-test Python sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          # console=False EXEs don't inherit stdio pipes, so stdout/stderr redirect
          # is useless. Instead, server_entry.py writes a timestamped progress log
          # to RUNNER_TEMP\cops_startup.log — printed below on any failure.
          $startupLog = "$env:RUNNER_TEMP\cops_startup.log"
          Remove-Item $startupLog -ErrorAction SilentlyContinue
          $proc = Start-Process -FilePath "${{ matrix.binary_src }}" -WindowStyle Hidden -PassThru
          Write-Host "Sidecar PID: $($proc.Id)"
          $ok = $false
          for ($i = 1; $i -le 60; $i++) {
            Start-Sleep -Seconds 1
            if ($proc.HasExited) {
              Write-Host "--- cops_startup.log ---"
              Get-Content $startupLog -ErrorAction SilentlyContinue
              Write-Error "FAIL Sidecar process exited early (code $($proc.ExitCode)) after ${i}s"
              exit 1
            }
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8000/api/mode" -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop
              if ($r.StatusCode -eq 200) {
                Write-Host "OK Sidecar responded on port 8000 after ${i}s"
                $ok = $true
                break
              }
            } catch {}
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) {
            Write-Host "--- cops_startup.log (last reached step + any error) ---"
            Get-Content $startupLog -ErrorAction SilentlyContinue
            Write-Error "FAIL Sidecar did not respond within 60 seconds"
            exit 1
          }

      - name: Move Sidecar Binary for Tauri
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          cp ${{ matrix.binary_src }} ${{ matrix.binary_dest }}

      # ── Rust setup ───────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # ── WiX Toolset (Windows MSI bundler) ────────────────────────────────────
      # Tauri downloads WiX on-demand during `tauri build`; that download fails
      # transiently (502/timeout) on CI. Pre-populate Tauri's WiX cache so the
      # bundler skips the download entirely. Cache persists across workflow runs.
      - name: Cache Tauri WiX tools (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\tauri\WixTools
          key: wix-3141

      - name: Pre-download WiX toolset if not cached (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $wixDir = "$env:LOCALAPPDATA\tauri\WixTools"
          if (Test-Path "$wixDir\candle.exe") {
            Write-Host "WiX already present - skipping download"
            exit 0
          }
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          $zip = "$env:TEMP\wix314-binaries.zip"
          $uri = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $ok = $false
          for ($i = 1; $i -le 3; $i++) {
            try {
              Write-Host "Downloading WiX toolset (attempt $i of 3)..."
              Invoke-WebRequest -Uri $uri -OutFile $zip -UseBasicParsing -TimeoutSec 120
              Expand-Archive -Path $zip -DestinationPath $wixDir -Force
              Write-Host "WiX installed to $wixDir"
              $ok = $true
              break
            } catch {
              if ($i -ge 3) { throw }
              Write-Host "Attempt $i failed, retrying in 15 seconds..."
              Start-Sleep -Seconds 15
            }
          }

      # ── Build Tauri App ──────────────────────────────────────────────────────
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./frontend"
          tauriScript: npx tauri
          args: ${{ matrix.tauri_args }}

      # ── Upload Artifacts ─────────────────────────────────────────────────────
      - name: Upload Windows MSI/EXE
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: cops-desktop-windows
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

      - name: Upload Linux DEB/AppImage
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: cops-desktop-linux
          path: |
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: cops-desktop-macos
          path: |
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7
