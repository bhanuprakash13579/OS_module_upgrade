name: Release Desktop App

# ─────────────────────────────────────────────────────────────────────────────
# This workflow ONLY runs when you push a version tag (e.g. v2.1.0).
# Regular pushes to main NEVER trigger a release.
#
# How to publish a release:
#   git tag v2.1.0
#   git push origin v2.1.0
#
# How to cancel / undo: delete the tag
#   git tag -d v2.1.0
#   git push origin :refs/tags/v2.1.0
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'   # matches v2.0.0, v2.1.3, etc.

jobs:
  release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # required to create GitHub Releases and upload assets
    strategy:
      fail-fast: false   # if one platform fails, others still complete
      matrix:
        include:
          - os: windows-latest
            binary_src: backend/dist/python-server.exe
            binary_dest: frontend/src-tauri/binaries/python-server-x86_64-pc-windows-msvc.exe
            tauri_args: "--bundles msi,nsis"

          - os: ubuntu-22.04
            binary_src: backend/dist/python-server
            binary_dest: frontend/src-tauri/binaries/python-server-x86_64-unknown-linux-gnu
            tauri_args: "--bundles deb,appimage"

          - os: macos-latest   # arm64 Apple Silicon (macos-13 Intel no longer available)
            binary_src: backend/dist/python-server
            binary_dest: frontend/src-tauri/binaries/python-server-aarch64-apple-darwin
            tauri_args: "--bundles app,dmg --target aarch64-apple-darwin"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node setup (must come before PyInstaller — spec bundles frontend/dist) ──
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (creates frontend/dist required by PyInstaller spec)
        working-directory: frontend
        run: npm run build

      # ── Linux system dependencies (must come before PyInstaller) ────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgdk-pixbuf2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libfontconfig1-dev

      # ── Python / PyInstaller ─────────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # WeasyPrint needs Cairo + Pango DLLs to be present when PyInstaller runs
      # so the hook can find and bundle them into the binary.
      # choco gtk-runtime installs GTK2 which lacks the required DLLs; use MSYS2 GTK3 instead.
      - name: Install GTK3 via MSYS2 (Windows — Cairo + Pango for WeasyPrint PDF)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          C:\msys64\usr\bin\pacman -S --noconfirm --needed `
            mingw-w64-x86_64-cairo `
            mingw-w64-x86_64-pango `
            mingw-w64-x86_64-gdk-pixbuf2 `
            mingw-w64-x86_64-fontconfig `
            mingw-w64-x86_64-harfbuzz
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install native dependencies (macOS — pyodbc + WeasyPrint Cairo/Pango)
        if: matrix.os == 'macos-latest'
        run: brew install unixodbc pango cairo fontconfig

      - name: Build Python server (PyInstaller)
        working-directory: backend
        env:
          ADMIN_PWD_HASH: ${{ secrets.ADMIN_PWD_HASH }}
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          # Bake the admin password hash into the source before PyInstaller
          # compiles it. os.environ.get() is evaluated at runtime on the
          # end-user's machine where ADMIN_PWD_HASH is not set, so we must
          # embed the literal hash value into the source code here.
          python3 -c "
import os, re
h = os.environ['ADMIN_PWD_HASH']
path = 'app/security/admin_auth.py'
src = open(path).read()
src = re.sub(
    r\"_ADMIN_PWD_HASH = os\\.environ\\.get\\([^)]+\\)\",
    f'_ADMIN_PWD_HASH = {repr(h)}',
    src
)
open(path, 'w').write(src)
print('Patched admin_auth.py: hash baked in.')
"
          pyinstaller --clean python-server.spec

      - name: Copy sidecar binary into Tauri binaries folder
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          cp ${{ matrix.binary_src }} ${{ matrix.binary_dest }}

      # ── Rust setup ───────────────────────────────────────────────────────────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # ── Build + Sign + Publish GitHub Release ────────────────────────────────
      # tauri-action with tagName set will:
      #   1. Build the Tauri app (frontend already built above — beforeBuildCommand is a no-op)
      #   2. Sign all installers with TAURI_SIGNING_PRIVATE_KEY
      #   3. Create a GitHub Release for this tag
      #   4. Upload all installers as release assets
      #   5. Upload latest.json (what the auto-updater checks)
      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ADMIN_PWD_HASH: ${{ secrets.ADMIN_PWD_HASH }}
        with:
          projectPath: ./frontend
          tauriScript: npx tauri
          args: ${{ matrix.tauri_args }}
          tagName: ${{ github.ref_name }}
          releaseName: "COPS v${{ github.ref_name }}"
          releaseBody: |
            ## What's in this release

            Download the installer for your platform from the assets below.

            | Platform | File |
            |----------|------|
            | Windows | `cops-customs-app_*_x64.msi` or `cops-customs-app_*_x64-setup.exe` |
            | Linux (Ubuntu/Debian) | `cops-customs-app_*_amd64.deb` |
            | Linux (portable) | `cops-customs-app_*_amd64.AppImage` |
            | macOS (Apple Silicon) | `cops-customs-app_*_aarch64.dmg` |

            **First install:** download and run the installer.
            **Existing install:** the app will auto-update — open the app and wait for the update banner.
          releaseDraft: false
          prerelease: false
