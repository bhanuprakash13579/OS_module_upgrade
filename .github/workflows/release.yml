name: Release Desktop App

# ─────────────────────────────────────────────────────────────────────────────
# This workflow ONLY runs when you push a version tag (e.g. v2.1.0).
# Regular pushes to main NEVER trigger a release.
#
# How to publish a release:
#   git tag v2.1.0
#   git push origin v2.1.0
#
# How to cancel / undo: delete the tag
#   git tag -d v2.1.0
#   git push origin :refs/tags/v2.1.0
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'   # matches v2.0.0, v2.1.3, etc.

jobs:
  release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # required to create GitHub Releases and upload assets
    strategy:
      fail-fast: false   # if one platform fails, others still complete
      matrix:
        include:
          - os: windows-latest
            binary_src: backend/dist/python-server.exe
            binary_dest: frontend/src-tauri/binaries/python-server-x86_64-pc-windows-msvc.exe
            tauri_args: "--bundles msi,nsis"
            rust_targets: ""

          - os: ubuntu-22.04
            binary_src: backend/dist/python-server
            binary_dest: frontend/src-tauri/binaries/python-server-x86_64-unknown-linux-gnu
            tauri_args: "--bundles deb,appimage"
            rust_targets: ""

          - os: macos-14        # arm64 Apple Silicon; macos-latest (=15) breaks bundle_dmg.sh
            binary_src: backend/dist/python-server
            binary_dest: frontend/src-tauri/binaries/python-server-aarch64-apple-darwin
            tauri_args: "--bundles app,dmg --target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node setup (must come before PyInstaller — spec bundles frontend/dist) ──
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (creates frontend/dist required by PyInstaller spec)
        working-directory: frontend
        run: npm run build

      # ── Linux system dependencies (must come before PyInstaller) ────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgdk-pixbuf2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libfontconfig1-dev

      # ── Python / PyInstaller ─────────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install native dependencies (macOS — pyodbc + WeasyPrint Cairo/Pango)
        if: runner.os == 'macOS'
        run: brew install unixodbc pango cairo fontconfig

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Bake admin password hash into source
        working-directory: backend
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: python bake_hash.py

      # WeasyPrint needs Cairo + Pango DLLs to be present when PyInstaller runs
      # so the hook can find and bundle them into the binary. Must come AFTER pip
      # install — adding C:\msys64\mingw64\bin to PATH before pip would shadow
      # setup-python's python.exe with MSYS2's python.exe.
      - name: Install GTK3 via MSYS2 (Windows — Cairo + Pango for WeasyPrint PDF)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          C:\msys64\usr\bin\pacman -Sy --noconfirm
          C:\msys64\usr\bin\pacman -S --noconfirm --needed mingw-w64-x86_64-cairo mingw-w64-x86_64-pango mingw-w64-x86_64-gdk-pixbuf2 mingw-w64-x86_64-fontconfig mingw-w64-x86_64-harfbuzz
          if ($LASTEXITCODE -ne 0) {
            Start-Sleep -Seconds 15
            C:\msys64\usr\bin\pacman -Sy --noconfirm
            C:\msys64\usr\bin\pacman -S --noconfirm --needed mingw-w64-x86_64-cairo mingw-w64-x86_64-pango mingw-w64-x86_64-gdk-pixbuf2 mingw-w64-x86_64-fontconfig mingw-w64-x86_64-harfbuzz
          }
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Python server (PyInstaller)
        working-directory: backend
        run: pyinstaller --clean python-server.spec

      # ── Smoke-test: verify the sidecar actually starts ───────────────────────
      - name: Smoke-test Python sidecar (Linux / macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          ${{ matrix.binary_src }} &
          SIDECAR_PID=$!
          echo "Sidecar PID: $SIDECAR_PID"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/mode > /dev/null 2>&1; then
              echo "OK Sidecar responded on port 8000 after ${i}s"
              kill $SIDECAR_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "FAIL Sidecar did not respond within 30 seconds"
          kill $SIDECAR_PID 2>/dev/null || true
          exit 1

      - name: Disable Windows Defender real-time scanning for CI paths
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          # PyInstaller onefile EXEs extract to %TEMP%\_MEIxxxxxx; Defender scans
          # every extracted DLL which can take 60-120 s on CI runners.
          Add-MpPreference -ExclusionPath $env:TEMP
          Add-MpPreference -ExclusionPath $env:TMP
          Add-MpPreference -ExclusionPath "C:\Users"
          Add-MpPreference -ExclusionPath "D:\"
          Add-MpPreference -ExclusionPath (Resolve-Path "backend\dist").Path
          Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Smoke-test Python sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          # console=False EXEs don't inherit stdio pipes, so stdout/stderr redirect
          # is useless. Instead, server_entry.py writes a timestamped progress log
          # to RUNNER_TEMP\cops_startup.log — printed below on any failure.
          $startupLog = "$env:RUNNER_TEMP\cops_startup.log"
          Remove-Item $startupLog -ErrorAction SilentlyContinue
          $proc = Start-Process -FilePath "${{ matrix.binary_src }}" -WindowStyle Hidden -PassThru
          Write-Host "Sidecar PID: $($proc.Id)"
          $ok = $false
          for ($i = 1; $i -le 60; $i++) {
            Start-Sleep -Seconds 1
            if ($proc.HasExited) {
              Write-Host "--- cops_startup.log ---"
              Get-Content $startupLog -ErrorAction SilentlyContinue
              Write-Error "FAIL Sidecar process exited early (code $($proc.ExitCode)) after ${i}s"
              exit 1
            }
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8000/api/mode" -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop
              if ($r.StatusCode -eq 200) {
                Write-Host "OK Sidecar responded on port 8000 after ${i}s"
                $ok = $true
                break
              }
            } catch {}
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) {
            Write-Host "--- cops_startup.log (last reached step + any error) ---"
            Get-Content $startupLog -ErrorAction SilentlyContinue
            Write-Error "FAIL Sidecar did not respond within 60 seconds"
            exit 1
          }

      - name: Copy sidecar binary into Tauri binaries folder
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          cp ${{ matrix.binary_src }} ${{ matrix.binary_dest }}

      # ── Rust setup ───────────────────────────────────────────────────────────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # ── WiX Toolset (Windows MSI bundler) ────────────────────────────────────
      - name: Cache Tauri WiX tools (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\tauri\WixTools
          key: wix-3141

      - name: Pre-download WiX toolset if not cached (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $wixDir = "$env:LOCALAPPDATA\tauri\WixTools"
          if (Test-Path "$wixDir\candle.exe") {
            Write-Host "WiX already present — skipping download"
            exit 0
          }
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          $zip = "$env:TEMP\wix314-binaries.zip"
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              Write-Host "Downloading WiX toolset (attempt $attempt/3)..."
              Invoke-WebRequest `
                -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" `
                -OutFile $zip -UseBasicParsing -TimeoutSec 120
              Expand-Archive -Path $zip -DestinationPath $wixDir -Force
              Write-Host "WiX installed to $wixDir"
              break
            } catch {
              if ($attempt -eq 3) { throw }
              Write-Host "Attempt $attempt failed — retrying in 15 s..."
              Start-Sleep -Seconds 15
            }
          }

      # ── Build + Sign + Publish GitHub Release ────────────────────────────────
      # tauri-action with tagName set will:
      #   1. Build the Tauri app (frontend already built above — beforeBuildCommand is a no-op)
      #   2. Sign all installers with TAURI_SIGNING_PRIVATE_KEY
      #   3. Create a GitHub Release for this tag
      #   4. Upload all installers as release assets
      #   5. Upload latest.json (what the auto-updater checks)
      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./frontend
          tauriScript: npx tauri
          args: ${{ matrix.tauri_args }}
          tagName: ${{ github.ref_name }}
          releaseName: "COPS ${{ github.ref_name }}"
          releaseBody: |
            ## What's in this release

            Download the installer for your platform from the assets below.

            | Platform | File |
            |----------|------|
            | Windows | `COPS_*_x64.msi` or `COPS_*_x64-setup.exe` |
            | Linux (Ubuntu/Debian) | `COPS_*_amd64.deb` |
            | Linux (portable) | `COPS_*_amd64.AppImage` |
            | macOS (Apple Silicon) | `COPS_*_aarch64.dmg` |

            **First install:** download and run the installer.
            **Existing install:** the app will auto-update — open the app and wait for the update banner.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
